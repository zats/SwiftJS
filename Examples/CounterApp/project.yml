name: CounterApp

options:
  minimumXcodeGenVersion: 2.38.0
  projectFormat: xcode16_0
  deploymentTarget:
    iOS: "18.0"
  defaultSourceDirectoryType: syncedFolder

packages:
  SwiftJS:
    path: ../..
  EsbuildKit:
    path: ../../../esbuild-swift
  OpenAI:
    path: ../../Vendor/OpenAI

targets:
  CounterApp:
    type: application
    platform: iOS
    preBuildScripts:
      - name: Build Counter Bundle
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/../CounterAppJS"
          pnpm build
        outputFiles:
          - $(SRCROOT)/App/Resources/counter.bundle.js
      - name: Copy TSX Project
        script: |
          set -euo pipefail
          ditto "$SRCROOT/App/Resources/counter.bundle.js" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/counter.bundle.js"
          ditto "$SRCROOT/App/Project" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Project"
    sources:
      - path: App
        type: syncedFolder
    dependencies:
      - package: SwiftJS
      - package: EsbuildKit
      - package: OpenAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftjs.counterapp
        PRODUCT_NAME: CounterApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_ASSET_PATHS: "\"App\""

schemes:
  CounterApp:
    build:
      targets:
        CounterApp: all
    run:
      config: Debug
